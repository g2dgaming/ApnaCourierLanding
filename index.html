          <h3>Unified Dashboard</h3>
          <p>Book shipments across all couriers from a single powerful dashboard. Compare rates, delivery times, and serviceability instantly.</p>

        <!-- FAQ -->
        <section style="padding:40px 0">
          <h2 style="text-align:center">Frequently Asked Questions</h2>

          <h3>What is ApnaCourier and how does it work?</h3>
          <p>ApnaCourier is India's leading multi-courier logistics aggregator platform. We integrate with 6+ courier partners including Delhivery, DTDC, Blue Dart, XpressBees, Ecom Express, and Trackon. You sign up, complete KYC, and instantly get access to compare rates, book shipments, track parcels, and manage COD remittances from a single dashboard.</p>

          <h3>Which courier partners are available on ApnaCourier?</h3>
          <p>We currently integrate with Delhivery, DTDC, Blue Dart, XpressBees, Ecom Express, and Trackon. New courier partners are added regularly. Each courier's rates, serviceability, and estimated delivery times are shown in real-time so you can always pick the best option for each shipment.</p>

          <h3>How much does it cost to use ApnaCourier?</h3>
          <p>ApnaCourier offers a free Starter plan with zero platform fee on your first 50 shipments. After that, pricing is volume-based and you only pay per shipment. There are no setup fees, no minimum volume requirements, and no lock-in period. We negotiate bulk rates with courier partners so you get the cheapest shipping rates available.</p>

          <h3>How does COD remittance work?</h3>
          <p>When your buyers pay Cash on Delivery, the courier partner collects the amount and remits it through ApnaCourier. We track every COD transaction in real-time and show you pending, in-transit, and settled amounts. Most remittances are settled within 7-10 business days depending on the courier partner.</p>

          <h3>Can I upload bulk orders via CSV or Excel?</h3>
          <p>Yes, our Growth and Enterprise plans support bulk order upload via CSV and Excel files. You can upload thousands of orders at once, and our auto-allocation engine will assign the best courier for each shipment based on your preferences like price, speed, and pincode serviceability.</p>

          <h3>What is the KYC process?</h3>
          <p>Our KYC is a simple step-by-step online process. You need to provide your business details (GST or Aadhaar for individuals), bank account information for COD settlements, and pickup address. Verification typically completes within 24 hours, after which you can start shipping immediately.</p>

          <h3>How does the Agent program work?</h3>
          <p>Our Agent program lets individuals and local businesses earn commissions by booking shipments for other businesses in their area. Agents get a simplified dashboard, competitive commission rates, and dedicated support. There's no investment required — just use your local network to help businesses ship smarter.</p>

          <h3>What pincodes does ApnaCourier cover?</h3>
          <p>Through our network of 6+ courier partners, we cover 29,000+ pincodes across all states and union territories of India. Our pincode serviceability checker instantly tells you which couriers can deliver to a specific location, along with estimated delivery times and rates.</p>

          <h3>How do I track my shipments?</h3>
          <p>All shipments booked through ApnaCourier are tracked in real-time on your dashboard. You get a unified tracking view across all couriers, automated status updates, NDR (Non-Delivery Report) alerts, and your buyers also receive SMS/email delivery notifications.</p>

          <h3>What is RTO and how does ApnaCourier help reduce it?</h3>
          <p>RTO stands for Return to Origin — when a shipment is returned to the seller because the buyer didn't accept it. ApnaCourier helps reduce RTO rates through smart address verification at booking time, automated NDR management with buyer communication, and analytics that identify high-RTO pincodes so you can take preventive action.</p>
        </section>
